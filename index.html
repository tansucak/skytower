<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTower Hotel Batumi - Redirecting...</title>
    <!-- Updated CSP to allow inline script and connection to IP API for Geolocation -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self' https://ipapi.co; frame-ancestors 'none';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 100px; background-color: #f8f9fa; color: #333; }
        .redirect-container { padding: 40px; background: #fff; max-width: 500px; margin: 0 auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #d4af37; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #d4af37; text-decoration: none; font-weight: 600; }
        .fallback-text { font-size: 12px; margin-top: 20px; }
    </style>
    
    <script type="text/javascript">
        // 1. KULLANICIYI İLGİLİ DİLE YÖNLENDİREN ANA FONKSİYON
        function redirectToLanguage(lang) {
            // Dil tercihini kaydet ki sonraki girişlerde API'ye tekrar gitmesin (Sonsuz döngüyü kırar)
            localStorage.setItem('preferredLang', lang);
            window.location.href = './' + lang + '/index.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            // 2. DAHA ÖNCE SEÇİLMİŞ VEYA TESPİT EDİLMİŞ DİL VAR MI?
            const savedLang = localStorage.getItem('preferredLang');
            const supportedLangs = ['tr', 'en', 'ru', 'ka'];
            
            if (savedLang && supportedLangs.includes(savedLang)) {
                // Kayıtlı dil varsa doğrudan yönlendir (API gecikmesi yaşatmaz)
                redirectToLanguage(savedLang);
                return;
            }

            // 3. TARAYICI DİLİNİ KONTROL ET (ÖNCELİKLİ)
            let browserLang = navigator.language || navigator.userLanguage || '';
            browserLang = browserLang.toLowerCase().substring(0, 2); // Sadece ilk iki harf (tr, en, ru vb.)
            
            // Eğer tarayıcı dili desteklediğimiz dillerdense, API'yi yormadan hemen yönlendir
            if (browserLang === 'tr') {
                redirectToLanguage('tr');
                return;
            } else if (browserLang === 'ru') {
                redirectToLanguage('ru');
                return;
            } else if (browserLang === 'ka') {
                // Gürcüce ISO 639-1 kodu 'ka'dır
                redirectToLanguage('ka'); 
                return;
            } else if (browserLang === 'en') {
                redirectToLanguage('en');
                return;
            }

            // 4. TARAYICI DİLİ BELİRSİZ VEYA DESTEKLENMİYORSA -> IP & KONUM KONTROLÜ
            // Ücretsiz ve hafif ipapi.co servisini kullanıyoruz
            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    const country = data.country_code; // ISO 3166-1 alpha-2 ülke kodu (TR, GE, RU vb.)
                    
                    if (country === 'TR') {
                        redirectToLanguage('tr'); // Türkiye -> Türkçe
                    } else if (country === 'GE') {
                        redirectToLanguage('ka'); // Gürcistan (GE) -> Gürcüce (ka)
                    } else if (country === 'RU' || country === 'BY' || country === 'KZ') {
                        // Rusya ve bazı BDT ülkeleri -> Rusça
                        redirectToLanguage('ru');
                    } else {
                        // Diğer tüm ülkeler için varsayılan (fallback) -> İngilizce
                        redirectToLanguage('en');
                    }
                })
                .catch(error => {
                    console.error('IP location detection failed:', error);
                    // Hata durumunda (AdBlocker, API limit dolumu vb.) güvenli fallback
                    redirectToLanguage('en');
                });
        });
    </script>

    <!-- SEO & Alternate Links -->
    <link rel="alternate" hreflang="tr" href="https://skytowerbatumi.com/tr/index.html" />
    <link rel="alternate" hreflang="en" href="https://skytowerbatumi.com/en/index.html" />
    <link rel="alternate" hreflang="ru" href="https://skytowerbatumi.com/ru/index.html" />
    <link rel="alternate" hreflang="ka" href="https://skytowerbatumi.com/ka/index.html" />
    <link rel="alternate" hreflang="x-default" href="https://skytowerbatumi.com/en/index.html" />
</head>
<body>
    <div class="redirect-container">
        <h2>SkyTower Hotel Batumi</h2>
        <div class="spinner"></div>
        <p>Please wait, finding the best language for you...</p>
        <p class="fallback-text">If not redirected automatically, <a href="./en/index.html">click here</a>.</p>
    </div>
</body>
</html>
